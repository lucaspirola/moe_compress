# kdr — ZAYA1-8B `da_qad` mode with NVFP4 weights + INT4 K + INT4 V
#
# This is the Phase 7.2 validation recipe: KIVI-style symmetric INT4 KV with
# NVFP4 weights, targeting eventual deployment on Blackwell sm_120 (RTX 5080).
# Router replay enabled per arxiv:2605.05365 §IV-C.
#
# Hardware: 1× H200 (preferred for FP8 fast path) or 4× A100-80GB.

mode: da_qad

teacher:
  name_or_path: Zyphra/ZAYA1-reasoning-base
  revision: main
  torch_dtype: bfloat16
  attn_implementation: sdpa

student:
  source: Zyphra/ZAYA1-reasoning-base  # self-distillation
  torch_dtype: bfloat16
  attn_implementation: sdpa

calibration:
  source: nvidia-cascade
  dataset: nvidia/Nemotron-Cascade-2-SFT-Data
  seed: 1337
  num_sequences: 13000
  sequence_length: 4096
  subset_weights:
    math: 0.21
    science: 0.11
    chat: 0.56
    instruction_following: 0.033
    conversational_agent: 0.0331
    swe: 0.02
    terminal_agent: 0.0331
  ptq_subset_size: 256

quant:
  weight:
    bits: 4
    format: nvfp4
    granularity: block
    transform: none
  kv_quant:
    key:
      bits: 4
      format: int
      granularity: channel  # KIVI: K per-channel
      transform: none
    value:
      bits: 4
      format: int
      granularity: token    # KIVI: V per-token
      transform: none

distillation:
  loss: forward_kld
  temperature: 1.0
  optimizer: adamw_bnb_8bit
  learning_rate: 2.0e-4
  min_learning_rate: 4.5e-7
  weight_decay: 0.01
  betas: [0.9, 0.999]
  grad_clip_norm: 1.0
  warmup_steps: 20
  total_tokens: 50_000_000
  per_device_batch_size: 1
  gradient_accumulation: 32
  sequence_length: 4096
  log_every_n_steps: 5
  eval_every_n_steps: 50
  save_every_n_steps: 0
  trainable_scope: full
  use_gradient_checkpointing: true

eval:
  wikitext2:
    enabled: true
    sequence_length: 2048
    num_sequences: 64
