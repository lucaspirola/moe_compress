# kdr — ZAYA1-8B `bf16` mode, 200-step infra smoke (Phase 7.1)
#
# Pure plumbing validation — NOT a math/learning test.
#
# Self-distillation (teacher == student == Zyphra/ZAYA1-reasoning-base) means
# FKLD ≈ 0 at init and has no descent signal. This config exists to validate:
#   - env-var validation (LLR-0032), repo clone, transformers-fork install (LLR-0035)
#   - snapshot_download of student
#   - run_id determinism (LLR-0031)
#   - partials save (every 50 steps → 4 partials with _SAVE_COMPLETE sentinels)
#   - resume from hub: re-run with same (config, student_sha, mode) → same run_id →
#     bootstrap finds the partials → resume completes (LLR-0033)
#   - final upload to recovered repo (LLR-0030)
#
# Acceptance: no NaN/OOM/NCCL hang; FKLD bounded near 0; WikiText-2 PPL finite;
# 4 partials present + final artifact uploaded; second launch with the same
# triple resumes correctly. NOT a parity test against any other pipeline.
#
# Wall-clock: ~5 min on 1× H200 at this minimal Phase 7.1 plumbing config
# (40 steps × 4_096 tokens/step). The previous 4096-seq/200-step variant
# was sized for a learning run (~110 min on H200, ~$7); for plumbing-only
# acceptance (4 partials saved + resume tested + load-back finite + no
# NaN/OOM/NCCL hang) the smaller variant covers every Phase 7.1 gate.
# Also fits comfortably on A100-80GB.

mode: bf16

teacher:
  name_or_path: Zyphra/ZAYA1-8B
  revision: main
  torch_dtype: bfloat16
  attn_implementation: sdpa

student:
  source: Zyphra/ZAYA1-8B  # self-distillation
  torch_dtype: bfloat16
  attn_implementation: sdpa

calibration:
  source: nvidia-cascade
  dataset: nvidia/Nemotron-Cascade-2-SFT-Data
  seed: 1337
  num_sequences: 13000
  sequence_length: 1024
  subset_weights:
    math: 0.21
    science: 0.11
    chat: 0.56
    instruction_following: 0.033
    conversational_agent: 0.0331
    swe: 0.02
    terminal_agent: 0.0331
  ptq_subset_size: 256

# `quant:` intentionally absent in `bf16` mode.

distillation:
  loss: forward_kld
  temperature: 1.0
  optimizer: adamw_bnb_8bit
  learning_rate: 2.0e-4
  min_learning_rate: 4.5e-7
  weight_decay: 0.01
  betas: [0.9, 0.999]
  grad_clip_norm: 1.0
  warmup_steps: 5
  # tokens_per_step = bs × world × ga × seq → total_steps = total_tokens // tokens_per_step.
  # Smoke deliberately uses bs=1, ga=4 (minimal step time at 4096 tokens/step).
  # For the REAL recovery run, raise `per_device_batch_size` to the largest
  # value that fits VRAM and divide `gradient_accumulation` by the same
  # factor — the total token budget stays constant, the optimizer trajectory
  # stays numerically equivalent, but per-step wall-time drops 1.5-2× on
  # Hopper/Blackwell at small bs. Or set `auto_batch_size: true` and let the
  # trainer probe at startup. The smoke leaves `auto_batch_size: false` (the
  # default) so plumbing validation runs at a known fixed configuration.
  total_tokens: 163_840         # 40 optimizer steps × (bs=1 × ga=4 × seq=1024)
  per_device_batch_size: 1
  gradient_accumulation: 4
  sequence_length: 1024
  log_every_n_steps: 2
  eval_every_n_steps: 20
  save_every_n_steps: 10        # 4 partials (10/20/30/40) — exercises resume
  trainable_scope: full
  use_gradient_checkpointing: true

eval:
  wikitext2:
    enabled: true
    sequence_length: 2048
    num_sequences: 64
