# Chapter 1 — Light tier (~1.8B tokens, ~6h on a100x4, ~$60)
#
# Logit-only forward KLD recovery for the Strategy A compressed model.
# Stack: FP8 teacher (sharded under ZeRO-3 via HfDeepSpeedConfig) +
# DeepSpeedCPUAdam (optim states on CPU host RAM) + grad checkpointing +
# DeepSpeed ZeRO-3 sharding of student weights/grads.
#
# Per-GPU memory footprint on a100x4 (each A100-80GB, host has 568 GB RAM):
#   teacher (FP8 sharded)            ~9 GB
#   student weights (BF16 sharded)  ~17 GB
#   student grads (BF16 sharded)    ~17 GB
#   optimizer state                  0 GB (CPU offload via DeepSpeedCPUAdam)
#   activations (grad ckpt)         ~12 GB
#   DeepSpeed buffers                ~5 GB
#   Total                          ~60 GB / 80 GB

teacher:
  name_or_path: Qwen/Qwen3.6-35B-A3B-FP8       # ~37 GB; lm_head + embed in BF16
  revision: main
  torch_dtype: bfloat16                        # non-FP8 modules
  attn_implementation: sdpa

student:
  # stage5_final from a max_quality run. Either a local path or an HF model repo.
  source: pirola/qwen3-6-35b-a3b-strategy-a-30pct-CHANGE_ME
  torch_dtype: bfloat16
  attn_implementation: sdpa

calibration:                                   # mirrors max_quality config
  source: nvidia-cascade
  dataset: nvidia/Nemotron-Cascade-2-SFT-Data
  seed: 1337
  num_sequences: 450000                        # 450k × 4096 ≈ 1.85B fresh tokens
  sequence_length: 4096
  subset_weights:
    math: 0.21
    science: 0.11
    chat: 0.56
    instruction_following: 0.033
    conversational_agent: 0.0331
    swe: 0.02
    terminal_agent: 0.0331

teacher_correction:
  enabled: true                                # Minitron BP#9: +3 MMLU vs no-correction
  target: bf16_then_requantize                 # bf16_then_requantize | lora_on_fp8
  steps: 400
  per_device_batch_size: 1
  gradient_accumulation: 16                    # effective batch 16
  learning_rate: 1.0e-6                        # well below SFT (model is well-converged)
  warmup_steps: 50

distillation:
  loss: forward_kld
  temperature: 1.0                             # Minitron Appendix A.3 sweep
  optimizer: deepspeed_cpu_adam                # ZeRO-3 + CPU optim offload
  learning_rate: 2.0e-4                        # Minitron §4 cosine high
  min_learning_rate: 4.5e-7                    # Minitron §4 cosine low
  weight_decay: 0.01
  betas: [0.9, 0.999]
  grad_clip_norm: 1.0                          # DS engine owns clipping (config: auto)
  warmup_steps: 100
  total_tokens: 1_800_000_000                  # Light tier
  per_device_batch_size: 1
  gradient_accumulation: 64                    # effective batch 64 × 4 GPUs = 256
  sequence_length: 4096
  log_every_n_steps: 10
  eval_every_n_steps: 200
  save_every_n_steps: 500
  trainable_scope: full                        # full | experts_only | factored_only
  use_gradient_checkpointing: true             # required at this scale
  nan_loss_circuit_breaker: true

eval:
  wikitext2:
    enabled: true
    sequence_length: 2048
    num_sequences: 256                         # ~30 sec on one GPU; collective forward
  sample_generations:
    enabled: true                              # safe under DS3 (gathers params)
    max_new_tokens: 128
    prompts:
      - "Explain Bayes' theorem in two sentences."
      - "Write a Python function that returns the nth Fibonacci number."

logging:
  level: INFO
